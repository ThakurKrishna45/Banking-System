spring:
  application:
    name: banking-system
  datasource:
#    url: jdbc:postgresql://localhost:5432/BankingSystem
#    username: postgres
#    password: 1
    url: jdbc:postgresql://localhost:5433/mydb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: localhost
      port: 6379

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        hibernate.jdbc.time_zone: Asia/Kolkata
    open-in-view: false